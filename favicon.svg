<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
<!-- Rear wing -->
  <rect x="2" y="12" width="5" height="2" rx="1" fill="#e63946"/>
  <rect x="2" y="11" width="5" height="1.5" rx="0.5" fill="#c1121f"/>

  <!-- Car body -->
  <rect x="4" y="14" width="22" height="7" rx="2" fill="#e63946"/>

  <!-- Cockpit -->
  <path d="M10 14 L13 9 L20 9 L23 14 Z" fill="#c1121f"/>

  <!-- Windshield -->
  <path d="M13.5 13.5 L15 10 L18.5 10 L20.5 13.5 Z" fill="#48cae4" opacity="0.85"/>

  <!-- Front wing -->
  <rect x="24" y="17" width="6" height="2" rx="1" fill="#e63946"/>

  <!-- Wheels -->
  <circle cx="9" cy="21.5" r="3.5" fill="#111"/>
  <circle cx="9" cy="21.5" r="2.2" fill="#333"/>
  <circle cx="9" cy="21.5" r="0.9" fill="#666"/>

  <circle cx="22" cy="21.5" r="3.5" fill="#111"/>
  <circle cx="22" cy="21.5" r="2.2" fill="#333"/>
  <circle cx="22" cy="21.5" r="0.9" fill="#666"/>

  <!-- Speed lines -->
  <line x1="1" y1="15" x2="4" y2="15" stroke="#ffd60a" stroke-width="1.2" stroke-linecap="round"/>
  <line x1="1" y1="17.5" x2="3.5" y2="17.5" stroke="#ffd60a" stroke-width="0.8" stroke-linecap="round" opacity="0.6"/>
  <line x1="1" y1="20" x2="4" y2="20" stroke="#ffd60a" stroke-width="0.8" stroke-linecap="round" opacity="0.3"/>
</svg>
